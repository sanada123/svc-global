<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="100" height="100" fill="#ffffff"/>

  <defs>
    <style>
      .s-letter { font-family: Georgia, 'Times New Roman', serif; font-weight: bold; font-size: 64px; fill: #0a0a0a; }
    </style>
  </defs>

  <!-- Elegant S Letter -->
  <text x="50" y="70" text-anchor="middle" class="s-letter">S</text>

  <!-- Subtle Gold accent line -->
  <line x1="20" y1="85" x2="80" y2="85" stroke="#d4af37" stroke-width="1.5" opacity="0.7"/>
</svg>