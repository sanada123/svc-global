<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0a0a0a"/>

  <!-- Gold Diamond Icon -->
  <g transform="translate(16, 16)">
    <!-- Outer diamond outline -->
    <polygon points="0,-10 10,0 0,10 -10,0" fill="none" stroke="#d4af37" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
    <!-- Inner center point -->
    <circle cx="0" cy="0" r="2.5" fill="#d4af37"/>
    <!-- Subtle inner cross -->
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#d4af37" stroke-width="0.6" opacity="0.7" vector-effect="non-scaling-stroke"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#d4af37" stroke-width="0.6" opacity="0.7" vector-effect="non-scaling-stroke"/>
  </g>
</svg>